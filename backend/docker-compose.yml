services:
  postgres:
    image: postgres:16
    container_name: snack_postgres
    restart: always
    environment:
      POSTGRES_DB: snack_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: